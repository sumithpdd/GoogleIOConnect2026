<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Silver background -->
  <rect width="100" height="100" fill="#1a1a1a"/>

  <!-- Silver gradient circle -->
  <defs>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Glow effect -->
  <circle cx="50" cy="50" r="45" fill="url(#glowGradient)"/>

  <!-- Main silver circle -->
  <circle cx="50" cy="50" r="40" fill="url(#silverGradient)"/>

  <!-- Silver text "S" -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-style="italic">S</text>

  <!-- Border ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#808080" stroke-width="2"/>
</svg>
