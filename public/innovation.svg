<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Innovation Background - Future & AI -->

  <!-- Gradient background -->
  <defs>
    <linearGradient id="innovationBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1a2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="innovationGlow" cx="70%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#c9b4cc;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#c9b4cc;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="800" fill="url(#innovationBg)"/>
  <ellipse cx="900" cy="300" rx="350" ry="250" fill="url(#innovationGlow)"/>

  <!-- Digital grid/matrix background -->
  <g opacity="0.1" stroke="#b8b8b8" stroke-width="1">
    <line x1="100" y1="200" x2="1100" y2="200"/>
    <line x1="100" y1="300" x2="1100" y2="300"/>
    <line x1="100" y1="400" x2="1100" y2="400"/>
    <line x1="100" y1="500" x2="1100" y2="500"/>
    <line x1="100" y1="600" x2="1100" y2="600"/>

    <line x1="200" y1="100" x2="200" y2="700"/>
    <line x1="400" y1="100" x2="400" y2="700"/>
    <line x1="600" y1="100" x2="600" y2="700"/>
    <line x1="800" y1="100" x2="800" y2="700"/>
    <line x1="1000" y1="100" x2="1000" y2="700"/>
  </g>

  <!-- Neural network nodes -->
  <g opacity="0.3">
    <!-- Layer 1 -->
    <circle cx="150" cy="250" r="12" fill="#b8b8b8"/>
    <circle cx="150" cy="450" r="12" fill="#b8b8b8"/>
    <circle cx="150" cy="650" r="12" fill="#b8b8b8"/>

    <!-- Layer 2 -->
    <circle cx="400" cy="200" r="14" fill="#d4af37"/>
    <circle cx="400" cy="400" r="14" fill="#d4af37"/>
    <circle cx="400" cy="600" r="14" fill="#d4af37"/>

    <!-- Layer 3 -->
    <circle cx="700" cy="300" r="12" fill="#c9b4cc"/>
    <circle cx="700" cy="500" r="12" fill="#c9b4cc"/>

    <!-- Layer 4 -->
    <circle cx="1000" cy="400" r="16" fill="#d4af37" opacity="0.8"/>

    <!-- Connection lines -->
    <line x1="165" y1="250" x2="385" y2="200" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
    <line x1="165" y1="450" x2="385" y2="400" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
    <line x1="165" y1="650" x2="385" y2="600" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>

    <line x1="415" y1="200" x2="685" y2="300" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
    <line x1="415" y1="400" x2="685" y2="500" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
    <line x1="415" y1="600" x2="685" y2="500" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>

    <line x1="715" y1="300" x2="985" y2="400" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
    <line x1="715" y1="500" x2="985" y2="400" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Data streams -->
  <g opacity="0.2" stroke="#d4af37" stroke-width="1" stroke-dasharray="5,5">
    <path d="M 100 300 Q 300 250 500 300"/>
    <path d="M 500 300 Q 700 320 900 400"/>
    <path d="M 100 500 Q 400 480 700 500"/>
  </g>

  <!-- Innovation text -->
  <text x="600" y="650" text-anchor="middle" fill="#c9b4cc" font-size="52" font-weight="bold" opacity="0.3">INNOVATE</text>
  <text x="600" y="710" text-anchor="middle" fill="#b8b8b8" font-size="24" opacity="0.2">AI-Powered Future</text>

  <!-- Tech symbols -->
  <g opacity="0.15">
    <!-- Circuit pattern -->
    <path d="M 1050 100 L 1050 150 L 1100 150" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <circle cx="1050" cy="150" r="3" fill="#b8b8b8"/>
  </g>
</svg>
