<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Heritage Background - Sitecore History & Denmark -->

  <!-- Gradient background -->
  <defs>
    <linearGradient id="heritageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="heritageGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#c9b4cc;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#c9b4cc;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="800" fill="url(#heritageBg)"/>
  <circle cx="600" cy="400" r="500" fill="url(#heritageGlow)"/>

  <!-- Danish Flag - Heritage -->
  <g opacity="0.3">
    <rect x="100" y="100" width="120" height="80" fill="#c8102e"/>
    <rect x="140" y="100" width="20" height="80" fill="white"/>
    <rect x="100" y="140" width="120" height="20" fill="white"/>
  </g>

  <!-- Timeline/History elements -->
  <line x1="150" y1="400" x2="1050" y2="400" stroke="#b8b8b8" stroke-width="2" opacity="0.3"/>

  <!-- Historical markers -->
  <circle cx="150" cy="400" r="8" fill="#c9b4cc" opacity="0.6"/>
  <text x="150" y="450" text-anchor="middle" fill="#b8b8b8" font-size="14">2001</text>

  <circle cx="500" cy="400" r="6" fill="#a0a0a0" opacity="0.4"/>
  <text x="500" y="450" text-anchor="middle" fill="#808080" font-size="12">Milestones</text>

  <circle cx="850" cy="400" r="8" fill="#d4af37" opacity="0.6"/>
  <text x="850" y="450" text-anchor="middle" fill="#d4af37" font-size="14">Today</text>

  <!-- Tivoli Gardens silhouette -->
  <g opacity="0.2">
    <!-- Ferris wheel -->
    <circle cx="200" cy="500" r="60" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <line x1="200" y1="440" x2="200" y2="560" stroke="#b8b8b8" stroke-width="2"/>
    <line x1="140" y1="500" x2="260" y2="500" stroke="#b8b8b8" stroke-width="2"/>
  </g>

  <!-- Year text -->
  <text x="600" y="700" text-anchor="middle" fill="#b8b8b8" font-size="48" font-weight="bold" opacity="0.3">25 YEARS</text>
  <text x="600" y="750" text-anchor="middle" fill="#808080" font-size="24" opacity="0.2">Heritage & Innovation</text>
</svg>
